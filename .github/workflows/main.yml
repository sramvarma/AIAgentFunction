name: Deploy Windows Function App

permissions:
  contents: read
  id-token: write # Essential for fetching the OIDC token

on:
  push:
    branches:
      - master  # triggers on push to main branch
  workflow_dispatch:  # allows manual trigger

env:
  AZURE_FUNCTIONAPP_NAME: aiagentfaramvar   # update this
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './AIAgentFunction'              # path to your function app project
  DOTNET_VERSION: '10.0.x'                          # match your function app runtime

jobs:
  build-and-deploy:
    runs-on: windows-latest  # Windows runner to match Windows Function App

    steps:

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup .NET
      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # 3. Restore dependencies
      - name: Restore dependencies
        run: dotnet restore

      # 4. Build the project
      - name: Build
        run: dotnet build --configuration Release --no-restore

      # 5. Publish the project
      - name: Publish
        run: dotnet publish --configuration Release --no-build --output ./output

      # 6. Deploy to Azure Function App
      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ./output
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}